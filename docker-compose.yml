services:
  postgres:
    image: postgres:16-alpine
    container_name: vehiamb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vehiamb
      POSTGRES_USER: vehiamb
      POSTGRES_PASSWORD: vehiamb_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehiamb -d vehiamb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: vehiamb-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: http://localhost:8080
      DB_CLIENT: postgres
      DATABASE_URL: postgres://vehiamb:vehiamb_dev@postgres:5432/vehiamb
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: vehiamb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
