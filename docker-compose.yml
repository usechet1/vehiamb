services:
  postgres:
    image: postgres:16-alpine
    container_name: vehiamb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vehiamb
      POSTGRES_USER: vehiamb
      POSTGRES_PASSWORD: vehiamb_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/schema.postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vehiamb -d vehiamb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: vehiamb-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: http://localhost:8080
      DB_CLIENT: postgres
      DATABASE_URL: postgres://vehiamb:vehiamb_dev@postgres:5432/vehiamb
      # El contenedor es Linux: no puede resolver rutas UNC (\\servidor\...) por
      # si solo. DESPACHOS_HOST_PATH (definida en .env, ver .env.example) debe
      # apuntar, desde el HOST donde corre Docker, a la carpeta ya montada del
      # recurso compartido (una unidad de red mapeada en Windows, o un mount
      # CIFS en Linux). Ese host path se monta abajo en /mnt/despachos dentro
      # del contenedor, y EXCEL_FILE_PATH apunta a esa ruta interna.
      EXCEL_FILE_PATH: /mnt/despachos/CARGUES BODEGA.xlsm
      STOCK_EXCEL_FILE_PATH: /data/saldo-real.xlsx
    ports:
      - "3001:3001"
    volumes:
      - "${DESPACHOS_HOST_PATH}:/mnt/despachos:ro"
      - "./saldo-real.xlsx:/data/saldo-real.xlsx:ro"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: vehiamb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
