<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehículos - VehiAmb</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="content">
            <div class="page-header">
                <div>
                    <h1>Vehículos</h1>
                    <p class="page-kicker">Consulta el parque automotor registrado</p>
                </div>
                <div class="page-header-right">
                    <p class="dash-fecha" id="fecha-hoy" aria-label="Fecha de hoy"></p>
                    <a class="header-action" href="add.html">Nuevo vehículo</a>
                </div>
            </div>

            <form id="vehiculosFilterForm" class="vehicles-toolbar">
                <input type="search" id="searchInput" class="vehicles-toolbar-search" placeholder="Buscar por placa, código, marca, modelo, VIN...">

                <select id="filterEstado" aria-label="Filtrar por estado">
                    <option value="">Estado: todos</option>
                    <option value="activo">Activo</option>
                    <option value="reparacion">En reparación</option>
                    <option value="fuera_servicio">Fuera de servicio</option>
                    <option value="dado_de_baja">Dado de baja</option>
                </select>

                <select id="filterTipoVehiculo" aria-label="Filtrar por tipo de vehículo">
                    <option value="">Tipo: todos</option>
                    <option value="Automovil">Automóvil</option>
                    <option value="Camioneta">Camioneta</option>
                    <option value="Camion">Camión</option>
                    <option value="Turbo">Turbo</option>
                    <option value="Tractocamion">Tractocamión</option>
                    <option value="Montacargas">Montacargas</option>
                    <option value="Motocicleta">Motocicleta</option>
                    <option value="Otro">Otro</option>
                </select>

                <select id="filterMarca" aria-label="Filtrar por marca">
                    <option value="">Marca: todas</option>
                </select>

                <select id="sortSelect" aria-label="Ordenar por">
                    <option value="recientes">Más recientes</option>
                    <option value="antiguos">Más antiguos</option>
                    <option value="placa_asc">Placa A-Z</option>
                    <option value="placa_desc">Placa Z-A</option>
                    <option value="km_mayor">Kilometraje mayor</option>
                    <option value="km_menor">Kilometraje menor</option>
                    <option value="proximo_mantenimiento">Próximo mantenimiento</option>
                </select>

                <select id="pageSizeSelect" aria-label="Vehículos por página">
                    <option value="10">10 por página</option>
                    <option value="20">20 por página</option>
                    <option value="50">50 por página</option>
                    <option value="100">100 por página</option>
                </select>

                <button type="button" id="clearFiltersButton" class="btn-secondary">Limpiar filtros</button>
            </form>

            <p id="filterSummary" class="field-help vehicles-toolbar-summary">Cargando vehículos...</p>

            <div id="loader" class="loader hidden">
                <video src="img/loader.mp4" autoplay loop muted playsinline></video>
            </div>

            <div id="vehiculosContainer" class="vehicles-grid"></div>

            <div id="vehiculosEmptyState" class="empty-state hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 13l1.5-4.5A2 2 0 0 1 6.4 7h11.2a2 2 0 0 1 1.9 1.5L21 13"/>
                    <path d="M3 13h18v5a1 1 0 0 1-1 1h-1a1 1 0 0 1-1-1v-1H6v1a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/>
                    <circle cx="7.5" cy="16" r="1.2"/>
                    <circle cx="16.5" cy="16" r="1.2"/>
                </svg>
                <p>No se encontraron vehículos con los filtros seleccionados.</p>
                <button type="button" id="emptyStateClearButton" class="btn-secondary">Limpiar filtros</button>
            </div>

            <div id="paginationBar" class="pagination-bar hidden">
                <span id="paginationSummary" class="field-help">Página 1 de 1 · 0 vehículos encontrados</span>
                <div class="pagination-controls">
                    <button type="button" id="paginationFirst" class="btn-secondary">Primera</button>
                    <button type="button" id="paginationPrev" class="btn-secondary">Anterior</button>
                    <button type="button" id="paginationNext" class="btn-secondary">Siguiente</button>
                    <button type="button" id="paginationLast" class="btn-secondary">Última</button>
                </div>
            </div>
        </main>
    </div>

    <script src="assets/js/shared/auth.js"></script>
    <script src="assets/js/shared/api.js"></script>
    <script src="assets/js/shared/ui.js"></script>
    <script src="assets/js/shared/notificaciones-config.js"></script>
    <script src="assets/js/shared/sidebar.js"></script>
    <script src="assets/js/pages/vehicles.js"></script>
</body>
</html>
