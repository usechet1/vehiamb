<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notificaciones - VehiAmb</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar"></aside>

        <main class="content">
            <div class="page-header">
                <div>
                    <h1>Centro de notificaciones</h1>
                    <p class="page-kicker">Mantenimientos, documentación, incidentes, usuarios y sistema en un solo lugar.</p>
                </div>
            </div>

            <section class="section-card">
                <div class="section-card-head">
                    <h2>Filtros</h2>
                    <p>Combina filtros y búsqueda para encontrar una notificación específica.</p>
                </div>
                <div class="section-card-body">
                    <form id="notifFilterForm" class="filter-form">
                        <div class="form-group">
                            <label>Buscar</label>
                            <input type="text" id="notifSearch" placeholder="Placa, título, descripción, usuario o tipo">
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Estado</label>
                                <select id="notifFiltroEstado">
                                    <option value="">Todos</option>
                                    <option value="no_leida">No leídas</option>
                                    <option value="leida">Leídas</option>
                                    <option value="archivada">Archivadas</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Prioridad</label>
                                <select id="notifFiltroPrioridad">
                                    <option value="">Todas</option>
                                    <option value="critica">Crítica</option>
                                    <option value="alta">Alta</option>
                                    <option value="media">Media</option>
                                    <option value="informativa">Informativa</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Categoría</label>
                                <select id="notifFiltroCategoria">
                                    <option value="">Todas</option>
                                    <option value="mantenimiento">Mantenimientos</option>
                                    <option value="documentacion">Documentación</option>
                                    <option value="incidente">Incidentes</option>
                                    <option value="usuario">Usuarios</option>
                                    <option value="sistema">Sistema</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Vehículo</label>
                                <select id="notifFiltroVehiculo">
                                    <option value="">Todos</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Desde</label>
                                <input type="date" id="notifFechaDesde">
                            </div>

                            <div class="form-group">
                                <label>Hasta</label>
                                <input type="date" id="notifFechaHasta">
                            </div>
                        </div>

                        <div class="filter-actions">
                            <span id="notifFilterSummary" class="field-help">Cargando notificaciones...</span>
                            <button type="button" id="notifClearFiltersButton" class="btn-secondary">Limpiar filtros</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="section-card">
                <div class="section-card-head">
                    <h2>Notificaciones</h2>
                    <div class="notif-bulk-actions">
                        <button type="button" id="notifMarkAllReadButton" class="btn-secondary">Marcar todas leídas</button>
                        <button type="button" id="notifDeleteReadButton" class="btn-secondary">Eliminar leídas</button>
                    </div>
                </div>
                <div class="section-card-body">
                    <div id="notifCenterList" class="records-list notif-center-list">
                        <p class="dash-empty">Cargando...</p>
                    </div>
                </div>
            </section>

            <div id="loader" class="loader hidden">
                <video src="img/loader.mp4" autoplay loop muted playsinline></video>
            </div>
            <div id="mensaje" class="mensaje hidden"></div>
        </main>
    </div>

    <script src="assets/js/shared/auth.js"></script>
    <script src="assets/js/shared/api.js"></script>
    <script src="assets/js/shared/ui.js"></script>
    <script src="assets/js/shared/notificaciones-config.js"></script>
    <script src="assets/js/shared/sidebar.js"></script>
    <script src="assets/js/pages/notificaciones.js"></script>
</body>
</html>
