<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - VehiAmb</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <main class="login-shell">
        <section class="login-panel">
            <div class="login-brand">
               <img src="img/vehiamb.png" alt="VehiAmb" class="logo-image">
            </div>

            <form id="loginForm" class="login-form">
                <div>
                </div>

                <div class="form-group">
                    <label for="loginEmail">Usuario:</label>
                    <div class="input-suffix-wrap input-suffix-wrap-domain">
                        <input type="text" id="loginEmail" name="email" placeholder="usuario" autocomplete="username" required>
                        <span class="input-suffix">@vehiamb.com</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Contraseña:</label>
                    <div class="password-field">
                        <input type="password" id="loginPassword" name="password" autocomplete="current-password" placeholder="Ingrese su clave" required>
                        <button type="button" id="togglePasswordButton" class="password-toggle" aria-label="Mostrar contraseña" aria-pressed="false">
                            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1.5 12S5 5 12 5s10.5 7 10.5 7-3.5 7-10.5 7S1.5 12 1.5 12Z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg class="icon-eye-off hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 3l18 18"/>
                                <path d="M10.6 5.1A10.9 10.9 0 0 1 12 5c7 0 10.5 7 10.5 7a13.4 13.4 0 0 1-3.15 4.15M6.5 6.6C3.4 8.6 1.5 12 1.5 12s3.5 7 10.5 7a10.6 10.6 0 0 0 4.2-.85"/>
                                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div id="loginMessage" class="mensaje hidden"></div>
        </section>
    </main>

    <script src="assets/js/shared/ui.js"></script>
    <script src="assets/js/shared/auth.js"></script>
    <script src="assets/js/pages/login.js"></script>
</body>
</html>
