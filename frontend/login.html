<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar - VehiAmb</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="login-body">
    <main class="login-shell">
        <section class="login-panel">
            <div class="login-brand">
               <img src="img/vehiamb.png" alt="VehiAmb" class="logo-image">
            </div>

            <form id="loginForm" class="login-form">
                <div>
                </div>

                <div class="form-group">
                    <label for="loginEmail">Usuario:</label>
                    <input type="email" id="loginEmail" name="email" autocomplete="username" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Contraseña:</label>
                    <input type="password" id="loginPassword" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div id="loginMessage" class="mensaje hidden"></div>
        </section>
    </main>

    <script src="assets/js/shared/ui.js"></script>
    <script src="assets/js/shared/auth.js"></script>
    <script src="assets/js/pages/login.js"></script>
</body>
</html>
