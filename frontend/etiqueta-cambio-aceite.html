<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etiqueta de cambio de aceite - VehiAmb</title>
    <style>
        * { box-sizing: border-box; }
        .hidden { display: none !important; }

        :root {
            --color-primary: #b21f2d;
            --color-primary-dark: #8f1924;
            --color-ink: #18202b;
            --color-muted: #697386;
            --color-border: #e3e7ee;
        }

        body {
            margin: 0;
            padding: 32px 16px;
            font-family: "Segoe UI", Arial, Helvetica, sans-serif;
            color: var(--color-ink);
            background: linear-gradient(160deg, #eef1f5 0%, #e4e9f0 100%);
        }

        .etiqueta {
            max-width: 430px;
            margin: 0 auto;
            background: #fff;
            border-radius: 16px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(24, 32, 43, 0.14);
            border: 1px solid var(--color-border);
        }

        .etiqueta-logo-wrap {
            text-align: center;
            padding: 20px 20px 14px;
            background: #fff;
        }

        .etiqueta-logo {
            height: 64px;
            width: auto;
        }

        .etiqueta-head {
            text-align: center;
            padding: 16px 20px 20px;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
            color: #fff;
        }

        .etiqueta-head h1 {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            margin: 0 0 10px;
            opacity: 0.92;
        }

        .etiqueta-placa {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: rgba(255, 255, 255, 0.16);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 10px;
            padding: 6px 14px;
            display: inline-block;
        }

        .etiqueta-body {
            padding: 18px 20px 20px;
        }

        .etiqueta-fila {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--color-border);
        }

        .etiqueta-fila:last-of-type { border-bottom: none; }
        .etiqueta-fila strong { color: var(--color-muted); font-weight: 600; }
        .etiqueta-fila span { font-weight: 600; }

        .etiqueta-proximo {
            margin-top: 14px;
            padding: 12px 14px;
            background: #fff3da;
            border: 1px solid #f0c467;
            border-radius: 10px;
            text-align: center;
        }

        .etiqueta-proximo .etiqueta-proximo-label {
            display: block;
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #a15c09;
            margin-bottom: 3px;
        }

        .etiqueta-proximo .etiqueta-proximo-valor {
            font-size: 1.05rem;
            font-weight: 800;
            color: var(--color-ink);
        }

        .etiqueta-section-title {
            margin: 18px 0 6px;
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-muted);
        }

        .etiqueta-lista {
            margin: 0;
            padding: 0;
            list-style: none;
            font-size: 0.88rem;
        }

        .etiqueta-lista li {
            padding: 7px 10px;
            background: #f8fafc;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            margin-bottom: 6px;
        }

        .etiqueta-lista li:last-child { margin-bottom: 0; }

        .etiqueta-footer {
            text-align: center;
            padding: 10px 20px 16px;
            font-size: 0.72rem;
            color: var(--color-muted);
        }

        .etiqueta-acciones {
            max-width: 430px;
            margin: 18px auto 0;
            text-align: center;
        }

        .etiqueta-acciones button {
            padding: 10px 18px;
            border-radius: 8px;
            border: 1px solid var(--color-primary);
            background: var(--color-primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        #estadoCarga { text-align: center; padding: 40px; color: var(--color-muted); }

        @media print {
            body { background: #fff; padding: 0; }
            .etiqueta { border-width: 1px; box-shadow: none; }
            .etiqueta-acciones { display: none; }
        }
    </style>
</head>
<body>
    <div id="estadoCarga">Cargando etiqueta...</div>
    <div class="etiqueta hidden" id="etiqueta">
        <div class="etiqueta-logo-wrap">
            <img src="img/logo_amb.png" alt="Logo" class="etiqueta-logo">
        </div>
        <div class="etiqueta-head">
            <h1>Cambio de aceite</h1>
            <div class="etiqueta-placa" id="etqPlaca">---</div>
        </div>
        <div class="etiqueta-body">
            <div class="etiqueta-fila"><strong>Fecha</strong><span id="etqFecha">--</span></div>
            <div class="etiqueta-fila"><strong>Kilometraje actual</strong><span id="etqKm">--</span></div>
            <div class="etiqueta-fila"><strong>Responsable</strong><span id="etqResponsable">--</span></div>
            <div class="etiqueta-proximo">
                <span class="etiqueta-proximo-label">Próximo cambio</span>
                <span class="etiqueta-proximo-valor" id="etqProximo">--</span>
            </div>
            <p class="etiqueta-section-title">Aceite y filtros reemplazados</p>
            <ul class="etiqueta-lista" id="etqRepuestos"></ul>
        </div>
        <div class="etiqueta-footer" id="etqFooter"></div>
    </div>
    <div class="etiqueta-acciones hidden" id="etiquetaAcciones">
        <button type="button" onclick="window.print()">Imprimir / Descargar PDF</button>
    </div>

    <script src="assets/js/shared/auth.js"></script>
    <script src="assets/js/shared/api.js"></script>
    <script>
        const CATEGORIAS_ETIQUETA = new Set(["aceite_motor", "filtro_aceite", "filtro_aire", "filtro_combustible"]);

        function formatDate(value) {
            if (!value) return "--";
            return new Date(`${String(value).slice(0, 10)}T00:00:00`).toLocaleDateString("es-CO", {
                day: "2-digit", month: "long", year: "numeric"
            });
        }

        // Mantenimientos creados antes del catálogo de repuestos (o sin
        // repuestos ligados) no tienen filas en mantenimiento_repuestos --
        // en ese caso se recurre al campo legado "repuestos" (texto libre)
        // para que la etiqueta igual muestre lo que se reemplazó.
        function parseRepuestosLegado(value) {
            if (!value) return [];

            try {
                const parsed = typeof value === "string" ? JSON.parse(value) : value;
                if (!Array.isArray(parsed)) return [];

                return parsed
                    .map((item) => (typeof item === "string" ? { repuesto: item } : item))
                    .map((item) => String(item.repuesto || item.nombre || "").trim())
                    .filter(Boolean);
            } catch (error) {
                return [];
            }
        }

        async function cargar() {
            const mantenimientoId = new URLSearchParams(window.location.search).get("mantenimiento_id");
            const estadoCarga = document.getElementById("estadoCarga");

            if (!mantenimientoId) {
                estadoCarga.textContent = "No se indicó el mantenimiento a mostrar.";
                return;
            }

            try {
                const [mantenimiento, repuestos] = await Promise.all([
                    window.VehiAmb.api.getMantenimiento(mantenimientoId),
                    window.VehiAmb.api.getMantenimientoRepuestos(mantenimientoId)
                ]);

                if (mantenimiento.tipo !== "cambio_aceite") {
                    estadoCarga.textContent = "Este mantenimiento no es un cambio de aceite.";
                    return;
                }

                document.getElementById("etqPlaca").textContent = mantenimiento.placa || "SIN PLACA";
                document.getElementById("etqFecha").textContent = formatDate(mantenimiento.fecha);
                document.getElementById("etqKm").textContent = `${Number(mantenimiento.kilometraje || 0).toLocaleString("es-CO")} km`;
                document.getElementById("etqResponsable").textContent = mantenimiento.hecho_por || "No registrado";
                document.getElementById("etqProximo").textContent = mantenimiento.proximo_cambio_km
                    ? `${Number(mantenimiento.proximo_cambio_km).toLocaleString("es-CO")} km (${formatDate(mantenimiento.proximo_cambio_fecha)})`
                    : "No calculado";

                const relevantes = repuestos.filter((item) => CATEGORIAS_ETIQUETA.has(item.categoria));
                const lista = document.getElementById("etqRepuestos");

                if (relevantes.length) {
                    lista.innerHTML = relevantes.map((item) => `<li>${item.nombre} (${item.codigo_interno}) × ${item.cantidad}</li>`).join("");
                } else {
                    const legado = parseRepuestosLegado(mantenimiento.repuestos);
                    lista.innerHTML = legado.length
                        ? legado.map((nombre) => `<li>${nombre}</li>`).join("")
                        : "<li>Sin repuestos registrados para este mantenimiento.</li>";
                }

                document.getElementById("etqFooter").textContent =
                    `Generado por VehiAmb - Software propio de Ambientes Cerámicos - el ${new Date().toLocaleString("es-CO")}`;

                estadoCarga.classList.add("hidden");
                document.getElementById("etiqueta").classList.remove("hidden");
                document.getElementById("etiquetaAcciones").classList.remove("hidden");
            } catch (error) {
                estadoCarga.textContent = error.message || "No fue posible cargar la etiqueta.";
            }
        }

        document.addEventListener("DOMContentLoaded", cargar);
    </script>
</body>
</html>
