server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sin esto, el navegador cachea HTML/CSS/JS de forma heuristica (sin
    # Cache-Control no hay senal explicita, asi que puede reusar una copia
    # vieja indefinidamente sin siquiera revalidar con el servidor). Esta
    # app se despliega seguido, asi que forzamos revalidacion en cada carga:
    # sigue siendo rapido (304 si no cambio nada) pero un cambio nuevo se ve
    # de inmediato en vez de requerir que el usuario haga hard-refresh.
    location ~* \.(?:html|js|css)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
